<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>05 · Live Demo</title>

<body>
<div class="page-num">05</div>
<div class="slide-main demo-intro">
  <div class="kicker">Live Demo</div>
  <h1>理念讲完，走一遍真的</h1>
  <p class="subtitle">陌生话题 · 完整流程 · 可交付初稿</p>

  <div class="demo-flow">
    <div class="demo-step">
      <svg viewBox="0 0 120 100" width="140" aria-hidden="true">
        <ellipse cx="60" cy="42" rx="44" ry="28" stroke="#1a1a1a" stroke-width="2.5" fill="#e4dcf4"/>
        <text x="60" y="48" text-anchor="middle" font-family="Patrick Hand, cursive" font-size="18" fill="#1a1a1a">?</text>
        <path d="M28 58 Q60 78 92 58" stroke="#1a1a1a" stroke-width="2" fill="none"/>
      </svg>
      <p>不熟的话题</p>
    </div>
    <span class="demo-arrow">→</span>
    <div class="demo-step">
      <svg viewBox="0 0 120 100" width="140" aria-hidden="true">
        <circle cx="60" cy="50" r="36" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
        <path d="M60 28v6M60 66v6M38 50h-6M82 50h6" stroke="#6b9fd4" stroke-width="2"/>

      </svg>
      <p>跑完整条管线</p>
    </div>
    <span class="demo-arrow">→</span>
    <div class="demo-step">
      <svg viewBox="0 0 120 100" width="140" aria-hidden="true">
        <rect x="28" y="28" width="64" height="52" rx="6" stroke="#1a1a1a" stroke-width="2.5" fill="#fff"/>
        <path d="M38 42h44M38 54h36M38 66h40" stroke="#5f5a50" stroke-width="2" stroke-linecap="round"/>
        <path d="M78 22l8-6 8 6" stroke="#6b9fd4" stroke-width="2" fill="none"/>
      </svg>
      <p>Survey 初稿</p>
    </div>
  </div>

  <p class="demo-tease">下一页：世界模型 — 我原本也不熟这个话题</p>
</div>
<script src="../shared/nav-keys.js"></script>
