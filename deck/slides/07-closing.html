<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>07 · 收束</title>
<link rel="stylesheet" href="../shared/fonts.css">
<link rel="stylesheet" href="../shared/handdrawn.css">
</head>
<body>
<div class="hills"></div>
<div class="page-num">07</div>
<div class="slide-main">
  <h1 style="font-size:72px">/auto-research</h1>
  <div class="closing-lines">
    端到端 · 有门禁 · 可迭代
  </div>
  <div class="play-wrap">
    <button id="play-folk" type="button" aria-label="播放爱尔兰民谣">▶ Play</button>
    <audio id="folk-audio" preload="none" src="../assets/irish-folk.wav"></audio>
    <p class="audio-hint">Irish folk 🎻</p>
  </div>
</div>
<script>
(function () {
  const btn = document.getElementById('play-folk');
  const audio = document.getElementById('folk-audio');
  btn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play().then(() => {
        btn.textContent = '⏸ Pause';
        btn.classList.add('playing');
      }).catch(() => {
        btn.textContent = '⚠ 无法播放';
      });
    } else {
      audio.pause();
      btn.textContent = '▶ Play';
      btn.classList.remove('playing');
    }
  });
  audio.addEventListener('ended', () => {
    btn.textContent = '▶ Play';
    btn.classList.remove('playing');
  });
})();
</script>
<script src="../shared/nav-keys.js"></script>
</body>
</html>
